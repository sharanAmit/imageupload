<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Memories — Private Self-Hosted Gallery</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom Sleek Stylesheet -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Google Identity Services (Sign in with Google) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <!-- Google Photos styled top header bar -->
    <header class="photos-header" id="app-header" style="display: none;">
        <div class="header-left">
            <a href="#/photos" class="header-logo-link">
                <div class="logo-fan">
                    <span class="fan-leaf leaf-blue"></span>
                    <span class="fan-leaf leaf-red"></span>
                    <span class="fan-leaf leaf-yellow"></span>
                    <span class="fan-leaf leaf-green"></span>
                </div>
                <span class="header-title">Photos</span>
            </a>
        </div>
        <div class="header-center">
            <div class="header-search-container">
                <i class="bi bi-search search-icon"></i>
                <input type="text" id="global-search-input" placeholder="Search your memories and trips...">
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile-trigger" id="profile-trigger" onclick="window.location.hash='#/profile'">
                <div class="profile-avatar-small" id="header-profile-avatar">?</div>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidebar Navigation (dynamically toggled/populated by router) -->
        <aside class="sidebar" id="app-sidebar" style="display: none;">
            <ul class="sidebar-menu">
                <li>
                    <a href="#/photos" class="sidebar-link" id="nav-photos">
                        <i class="bi bi-image"></i>
                        <span>Photos</span>
                    </a>
                </li>
                <li>
                    <a href="#/trips" class="sidebar-link" id="nav-trips">
                        <i class="bi bi-compass"></i>
                        <span>Trips</span>
                    </a>
                </li>
                <li>
                    <a href="#/dashboard" class="sidebar-link" id="nav-dashboard">
                        <i class="bi bi-grid-1x2"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="#/profile" class="sidebar-link" id="nav-profile">
                        <i class="bi bi-person"></i>
                        <span>Profile</span>
                    </a>
                </li>
                <li class="mt-auto">
                    <a href="#" class="sidebar-link text-danger" id="nav-logout">
                        <i class="bi bi-box-arrow-left"></i>
                        <span>Logout</span>
                    </a>
                </li>
            </ul>
        </aside>

        <!-- Main View Mount -->
        <main class="main-content" id="main-content">
            <!-- Dynamically populated by JS Router -->
        </main>
    </div>


    <!-- Lightbox / Fullscreen Media Preview Modal -->
    <div class="lightbox-modal" id="lightbox-modal">
        <button class="lightbox-close-btn" id="lightbox-close">
            <i class="bi bi-x-lg"></i>
        </button>
        <div class="lightbox-content">
            <div class="lightbox-media-container" id="lightbox-media-mount">
                <!-- Image or Video tag will be injected here -->
            </div>
            <div class="lightbox-details-panel">
                <div>
                    <h3 id="lightbox-title" class="mb-3">Memory details</h3>
                    <table class="table table-borderless text-secondary fs-7">
                        <tbody>
                            <tr>
                                <td class="ps-0 py-1" style="width: 100px;">Trip Name</td>
                                <td class="py-1 text-dark fw-semibold" id="lightbox-trip-name">-</td>
                            </tr>
                            <tr>
                                <td class="ps-0 py-1">Uploaded By</td>
                                <td class="py-1 text-dark" id="lightbox-uploader">-</td>
                            </tr>
                            <tr>
                                <td class="ps-0 py-1">Upload Date</td>
                                <td class="py-1 text-dark" id="lightbox-date">-</td>
                            </tr>
                            <tr>
                                <td class="ps-0 py-1">File Size</td>
                                <td class="py-1 text-dark" id="lightbox-size">-</td>
                            </tr>
                            <tr>
                                <td class="ps-0 py-1">Type</td>
                                <td class="py-1 text-dark text-uppercase" id="lightbox-mime">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="d-flex gap-3">
                    <a href="#" id="lightbox-download-btn" class="btn btn-premium w-100" download>
                        <i class="bi bi-download"></i> Download
                    </a>
                    <button id="lightbox-delete-btn" class="btn btn-premium btn-danger-premium w-100" style="display: none;">
                        <i class="bi bi-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Toast Container for Sleek Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-4" style="z-index: 3000;">
        <div id="live-toast" class="toast align-items-center text-white bg-dark border-0 rounded-4 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-message">
                    Hello, world!
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- Main Module Application entry point -->
    <script type="module" src="assets/js/app.js"></script>
</body>
</html>
